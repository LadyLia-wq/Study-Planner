<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Study Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header">
    <h1>📚 Study Planner</h1>
  </header>

  <main class="container">

    <!-- ADD TASK FORM -->
    <section class="task-form card">
      <h2>Add New Task</h2>
      <div class="card-scroll">
        <div class="quote-block">
          <span class="quote-label">Quote of the Day</span>
          <p id="quote">Loading quote...</p>
        </div>
        <input type="text" id="taskTitle" placeholder="Task title">
        <input type="text" id="taskSubject" placeholder="Subject">
        <input type="date" id="taskDate">
        <button id="addTaskBtn">Add Task</button>
      </div>
    </section>

    <!-- TASK LIST -->
    <section class="task-list card">
      <h2>Your Tasks</h2>
      <select id="filterSubject">
        <option value="all">All Subjects</option>
      </select>
      <div class="card-scroll">
        <div id="taskContainer"></div>
      </div>
    </section>

    <!-- PLANNER -->
    <section class="planner card">
      <h2>Planner View</h2>
      <div class="card-scroll">
        <div id="plannerContainer"></div>
      </div>
    </section>

  </main>

  <script type="module" src="js/main.js"></script>

</body>
</html>
